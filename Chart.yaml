apiVersion: v2
name: payment-gateway-service
version: 2.1.1
appVersion: "2.1.1"
description: Payment Gateway Service Helm Chart

# FIXED: Increased timeout for complex deployments
timeout: 600s  # Increased from 120s to prevent timeout

# FIXED: Added retry configuration for hooks
hooks:
  enabled: true
  timeout: 300s
  retries: 3
  
# FIXED: Increased resource limits for faster startup
resources:
  limits:
    cpu: 500m  # Increased from 100m
    memory: 512Mi  # Increased from 128Mi
  requests:
    cpu: 250m  # Increased from 50m
    memory: 256Mi  # Increased from 64Mi

# FIXED: Added proper timeout configuration
install:
  timeout: 600s
  disableHooks: false
  wait: true
  
upgrade:
  timeout: 600s
  disableHooks: false
  wait: true
  
# FIXED: Added rollback configuration
rollback:
  timeout: 300s
  recreate: false
  force: false
