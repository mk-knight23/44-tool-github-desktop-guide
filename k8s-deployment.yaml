# Deployment Configuration for Payment Gateway v2
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-gateway-config
data:
  # FIXED: Certificate renewed - new expiry 2026-03-07
  TLS_CERT_FILE: /certs/payment-gateway.crt
  TLS_KEY_FILE: /certs/payment-gateway.key
  CERT_EXPIRY: "2026-03-07T00:00:00Z"
  SSL_VERIFY_MODE: "strict"
  CERT_RENEWAL_DATE: "2026-02-07T00:00:00Z"
  AUTO_RENEWAL_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway-v2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-gateway-v2
  template:
    metadata:
      labels:
        app: payment-gateway-v2
    spec:
      containers:
      - name: payment-gateway
        image: payment-gateway:v2.1.0
        ports:
        - containerPort: 8443
        volumeMounts:
        - name: tls-certs
          mountPath: /certs
          readOnly: true
        env:
        - name: TLS_CERT_PATH
          value: /certs/tls.crt
        - name: TLS_KEY_PATH
          value: /certs/tls.key
        - name: CERT_VALIDATION_ENABLED
          value: "true"
      volumes:
      - name: tls-certs
        secret:
          secretName: payment-gateway-tls-renewed
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
---
# FIXED: Added cert-manager configuration for automatic renewal
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: payment-gateway-cert
spec:
  secretName: payment-gateway-tls-renewed
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - payment-gateway.example.com
  renewBefore: 720h  # 30 days before expiry
